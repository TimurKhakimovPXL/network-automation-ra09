# inventory.yaml — Single source of truth for what hardware exists in the lab.
#
# This file declares every Cisco device under management. The reconciler reads
# it to know what to converge; scripts/apply_dhcp_reservations.py reads it to
# render DHCP reservations; profiles use it as the substrate for templating.
#
# When a new device is racked, add an entry here. Everything downstream updates
# automatically on the next reconciliation cycle.
#
# Field reference:
#   name        — Hostname for reporting and identification
#   rack        — Rack number, 1-10
#   side        — c01 or c02 (left or right router in the rack)
#   mgmt_ip     — OOB management IP (on GigabitEthernet0)
#   wan_octet   — Host octet on the WAN side, used for IP templating in profiles
#   mac         — MAC address of GigabitEthernet0, used for DHCP reservation
#   platform    — Hardware model, currently ISR4200 throughout
#   ios_version — IOS XE version; affects which YANG paths some handlers use
#
# OOB addressing scheme (subject to confirmation — see docs/oob_network_design.md §4):
#   Currently using the inherited 172.17.X.0/28 per-rack scheme. May migrate to a
#   single flat /24 once Wim Leppens confirms the OOB subnet allocation. When that
#   happens, only the mgmt_ip values in this file change; nothing else.
#
# WAN addressing:
#   C01 routers use odd octets:  rack 1 = 10.199.65.1, rack 2 = 10.199.65.3, ...
#   C02 routers use even octets: rack 1 = 10.199.65.2, rack 2 = 10.199.65.4, ...

