
# Minimal profile for lab-dc-h-sw01, a C9200L running IOS XE 17.6.3.
# It changes only the description on unused port Gi1/0/24, which was checked
# through RESTCONF on 2026-05-18. Returning the device to observe mode does not
# remove the description; remove it manually if a clean port is required.


description: "C9200L demo: description on unused Gi1/0/24"

per_device_changes:
  - id: gi1-0-24-description
    type: interface_description
    interface_type: GigabitEthernet
    interface_name: "1/0/24"
    description: "Managed by network-automation-ra09: demo port, no client connected"
