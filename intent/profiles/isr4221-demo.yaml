
# Loopback-only ISR4221 profile retained as a smaller alternative to
# isr4221-physical-test. It exercises description, address, state, and dependency
# handling without changing a physical interface. NIM-2T serial ports are not
# managed by this profile.


description: "ISR4221 demo: Loopback only"

per_device_changes:
  - id: loopback0-description
    type: interface_description
    interface_type: Loopback
    interface_name: "0"
    description: "Managed by network-automation-ra09: RA11 demo loopback"

  - id: loopback0-ip
    type: interface_ip
    interface_type: Loopback
    interface_name: "0"
    ip: 192.168.11.1
    mask: 255.255.255.255
    depends_on: loopback0-description

  - id: loopback0-state
    type: interface_state
    interface_type: Loopback
    interface_name: "0"
    state: up
    depends_on: loopback0-ip
