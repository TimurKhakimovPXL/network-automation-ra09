
# Multi-handler profile for LAB-R11-C01-R01, an ISR4221 running IOS XE 17.3.4.
# It configures Loopback0, unused physical port Gi0/0/1, and OSPF process 1.
# Gi0/0/0 is the management path and is intentionally absent. Gi0/0/1 was
# confirmed shut down, unaddressed, and physically disconnected on 2026-05-12.
# 192.0.2.0/30 is TEST-NET-1; 192.168.11.1/32 is the loopback from the smaller
# isr4221-demo profile. NIM-2T serial interfaces remain outside the scope.
#
# Switching back to isr4221-demo does not remove Gi0/0/1 or OSPF because these
# handlers are additive. Use a maintenance wipe or remove them manually when a
# clean rollback is required.


description: "ISR4221 multi-handler test: Loopback0 + Gi0/0/1 + OSPF area 0"

per_device_changes:

  # Loopback0, retained from isr4221-demo for the idempotency check
  - id: loopback0-description
    type: interface_description
    interface_type: Loopback
    interface_name: "0"
    description: "Managed by network-automation-ra09: RA11 demo loopback"

  - id: loopback0-ip
    type: interface_ip
    interface_type: Loopback
    interface_name: "0"
    ip: 192.168.11.1
    mask: 255.255.255.255
    depends_on: loopback0-description

  - id: loopback0-state
    type: interface_state
    interface_type: Loopback
    interface_name: "0"
    state: up
    depends_on: loopback0-ip

  # Gi0/0/1 is currently shut down and unconfigured
  - id: gi001-description
    type: interface_description
    interface_type: GigabitEthernet
    interface_name: "0/0/1"
    description: "Managed by network-automation-ra09: physical port test (no link expected)"

  - id: gi001-ip
    type: interface_ip
    interface_type: GigabitEthernet
    interface_name: "0/0/1"
    ip: 192.0.2.1
    mask: 255.255.255.252
    depends_on: gi001-description

  - id: gi001-state
    type: interface_state
    interface_type: GigabitEthernet
    interface_name: "0/0/1"
    state: up
    depends_on: gi001-ip

  # OSPF process 1 advertising both networks
  # First OSPF process on this device. Two networks:
  #   - 192.168.11.1/32 (Loopback0) in area 0
  #   - 192.0.2.0/30 (Gi0/0/1 subnet) in area 0
  # The handler selects the OSPF payload shape from the advertised model
  # revision and records both the revision and selected schema in the report.
  - id: ospf-process
    type: ospf
    process_id: 1
    router_id: 192.168.30.1
    networks:
      - prefix: 192.168.11.1
        wildcard: 0.0.0.0
        area: 0
      - prefix: 192.0.2.0
        wildcard: 0.0.0.3
        area: 0
    depends_on: gi001-state
