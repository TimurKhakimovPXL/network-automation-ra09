# ospf-baseline.yaml: Every device runs OSPF area 0 on its WAN uplink.
#
# The reconciler renders this Jinja2 template once for each inventory entry.
#
# Available rendering variables (one per device):
#   {{ name }}       : e.g. "LAB-RA09-C01-R01"
#   {{ rack }}       : integer 1-10
#   {{ side }}       : "c01" or "c02"
#   {{ mgmt_ip }}    : e.g. "172.17.9.2"
#   {{ wan_octet }}  : integer 1-20, used for WAN-side IP allocation
#   {{ mac }}        : MAC of GigabitEthernet0
#   {{ platform }}   : e.g. "ISR4200"
#   {{ ios_version }}: e.g. "16.8"
#
# See routing-and-vlans.yaml for a profile with per-side conditionals.

description: "OSPF baseline: single area 0, WAN uplink advertised"

per_device_changes:

  # WAN-side IP address
  - type: interface_ip
    interface_type: GigabitEthernet
    interface_name: "0/0/0"
    ip: "10.199.65.{{ wan_octet }}"
    mask: "255.255.255.224"            # /27, per existing addressing scheme

  # WAN interface up
  - type: interface_state
    interface_type: GigabitEthernet
    interface_name: "0/0/0"
    state: up

  # OSPF process advertising the WAN network
  - type: ospf
    process_id: 1
    networks:
      - prefix: "10.199.65.0"
        wildcard: "0.0.0.31"
        area: 0
