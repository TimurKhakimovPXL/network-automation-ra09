# changes.yaml — Full rack deployment example
#
# Credentials come from .env (LAB_USER / LAB_PASS) — never put them here.
#
# This file shows a complete RA09 rack deployment:
#   - C01-R01 router: IPs, routing, DHCP server, HSRP active
#   - C02-R01 router: IPs, routing, DHCP server, HSRP standby
#   - A01-SW01 switch: VLANs, access ports, uplink trunk, EtherChannel
#
# Uncomment devices as they are confirmed reachable.
# Run: python3 automate.py

devices:

  # ── RA09 — C01-R01 (left router, HSRP active) ─────────────────────────────
  - name: LAB-RA09-C01-R01
    host: 172.17.9.2
    changes:

      - type: interface_description
        interface_type: GigabitEthernet
        interface_name: "0/0/0"
        description: RA09-L management — 172.17.9.2/28

      - type: interface_description
        interface_type: GigabitEthernet
        interface_name: "0/0/1"
        description: RA09-L WAN uplink — LAB-BR-A-SW08 Fa0/17

      - type: interface_ip
        interface_type: GigabitEthernet
        interface_name: "0/0/1"
        ip: 10.199.65.17
        mask: 255.255.255.224

      - type: interface_state
        interface_type: GigabitEthernet
        interface_name: "0/0/1"
        state: up

      - type: static_route
        routes:
          - prefix: 0.0.0.0
            mask: 0.0.0.0
            next_hop: 10.199.65.1
            description: Default route via backbone

      - type: ospf
        process_id: 1
        router_id: 172.17.9.2
        networks:
          - prefix: 172.17.9.0
            wildcard: 0.0.0.15
            area: 0
          - prefix: 172.17.9.16
            wildcard: 0.0.0.15
            area: 0
          - prefix: 10.199.65.0
            wildcard: 0.0.0.31
            area: 0

      - type: hsrp
        interface_type: GigabitEthernet
        interface_name: "0/0/0"
        group: 1
        version: 2
        priority: 110
        preempt: true
        virtual_ip: 172.17.9.1

      - type: dhcp_server
        excluded:
          - start: 172.17.9.1
            end: 172.17.9.20
        pools:
          - name: RA09-L-Data
            network: 172.17.9.16
            mask: 255.255.255.240
            default_router: 172.17.9.17
            dns_servers:
              - 10.199.64.66
            lease_days: 1

