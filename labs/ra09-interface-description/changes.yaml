# changes.yaml — Desired state input for automate_interface_desc.py
#
# Credentials are loaded from .env — do not add username/password here.
#
# Structure:
#   Each device entry requires:
#     - name:  device hostname (for reporting)
#     - host:  management IP (must be reachable on TCP/830 and TCP/443)
#     - changes: list of interface changes to apply
#
# Addressing scheme (X = rack number):
#   C01-R01 management IP: 172.17.X.2   (left side,  subnet 172.17.X.0/28)
#   C02-R01 management IP: 172.17.X.66  (right side, subnet 172.17.X.64/28)
#
# Uncomment devices as DHCP reservations are confirmed with the lab supervisor.

